name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

jobs:
  macos:
    name: macOS SPM unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'
      - name: Set up SDK
        run: cd sdk && sudo make install
      - name: Run tests
        run: swift test

  macos_raw:
    name: macOS raw build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'
      - name: Raw build
        run: swift build
  
  linux:
    name: Linux SPM unit tests
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false
      - name: Install tools
        run: apt-get update && apt-get install make
      - name: Set up SDK
        run: cd sdk && make install
      - name: Run tests
        run: swift test
